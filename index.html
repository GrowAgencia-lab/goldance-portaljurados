  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg-image) center top/cover no-repeat fixed, var(--bg);color:var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 20px 40px;}
  header{padding:28px 0 18px;text-align:center;}
  header img{height:130px;}
  .subtitulo{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:6px;}
  h1{font-size:16px;font-weight:700;text-align:center;color:var(--gold-bright);margin:22px 0 6px;}
  .instrucciones{text-align:center;font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;}
  .lista{display:flex;flex-direction:column;gap:10px;}
  .dia-btn{display:flex;align-items:center;justify-content:center;background:var(--bg-elev);
    border:1.5px solid var(--gold);border-radius:14px;padding:22px 20px;text-decoration:none;color:var(--gold-bright);
    font-size:18px;font-weight:700;transition:all .15s;cursor:pointer;}
  .dia-btn:active{transform:scale(0.98);background:rgba(184,132,47,0.1);}
  .volver{background:none;border:none;color:var(--gold-bright);font-size:13px;font-weight:700;
    cursor:pointer;padding:0;margin-bottom:16px;}
  .jurado-btn{display:flex;align-items:center;justify-content:space-between;background:var(--bg-elev);
    border:1px solid var(--line);border-radius:14px;padding:18px 20px;text-decoration:none;color:var(--cream);
    font-size:16px;font-weight:600;transition:all .15s;cursor:pointer;}
  .jurado-btn:active{transform:scale(0.98);background:rgba(184,132,47,0.08);}
  .jurado-btn .dias{font-size:11px;color:var(--muted);font-weight:400;margin-top:3px;}
  .jurado-btn .flecha{color:var(--gold);font-size:20px;}
  .footer{text-align:center;margin-top:30px;font-size:11px;color:var(--muted);}
</style>

  <h1 id="titulo">¿Qué día evaluás?</h1>
  <div class="instrucciones" id="instrucciones">Elegí el día para ver solo los jurados que corresponden</div>

  <div class="lista" id="lista"></div>

  <div class="footer">Goldance Festival Competitivo PY · 2026</div>
</div>

<script>
const BASE_URL = 'https://growagencia-lab.github.io/goldance-jurado-app/';

const JURADOS = [
  { slug: 'liliana', nombre: 'Liliana Calderini', dias: ['viernes'] },
  { slug: 'vivi', nombre: 'Viviana Galeano', dias: ['viernes', 'domingo'] },
  { slug: 'nati', nombre: 'Natalia Ramos', dias: ['viernes', 'domingo'] },
  { slug: 'aldeir', nombre: 'Aldeir Monteiro', dias: ['sabado'] },
  { slug: 'bethania', nombre: 'Bethania Joaquinho', dias: ['sabado'] },
  { slug: 'regina', nombre: 'María Regina Pampliega Royg', dias: ['sabado', 'domingo'] },
  { slug: 'manuel', nombre: 'Manuel Pérez', dias: ['sabado', 'domingo'] },
  { slug: 'fernando', nombre: 'Fernando Lima', dias: ['sabado', 'domingo'] },
  { slug: 'cynthia', nombre: 'Cynthia Echagüe', dias: ['domingo'] },
];

const DIAS = [
  { valor: 'viernes', label: 'Viernes 3' },
  { valor: 'sabado', label: 'Sábado 4' },
  { valor: 'domingo', label: 'Domingo 5' },
];

function mostrarDias(){
  document.getElementById('titulo').textContent = '¿Qué día evaluás?';
  document.getElementById('instrucciones').textContent = 'Elegí el día para ver solo los jurados que corresponden';
  const lista = document.getElementById('lista');
  lista.innerHTML = DIAS.map(d => `<button class="dia-btn" onclick="mostrarJurados('${d.valor}')">${d.label}</button>`).join('');
}

function mostrarJurados(dia){
  const diaLabel = DIAS.find(d => d.valor === dia).label;
  document.getElementById('titulo').textContent = diaLabel;
  document.getElementById('instrucciones').textContent = 'Tocá tu nombre para entrar a tu app personal';
  const jurados = JURADOS.filter(j => j.dias.includes(dia));
  const lista = document.getElementById('lista');
  lista.innerHTML =
    `<button class="volver" onclick="mostrarDias()">← Cambiar día</button>` +
    jurados.map(j => `
      <a class="jurado-btn" href="${BASE_URL}?jurado=${j.slug}">
        <span>${j.nombre}</span>
        <span class="flecha">→</span>
      </a>
    `).join('');
}

mostrarDias();
</script>
